spring:
  application:
    name: NoCodePlatform
  profiles:
    active: local
  devtools:
    restart:
      enabled: false
server:
  port: 8790
  servlet:
    context-path: /api
    session:
      cookie:
        max-age: 2592000
springdoc:
  group-configs:
    - group: 'default'
      packages-to-scan: my.nocodeplatform.controller
kinfe4j:
  enable: true
  setting:
    language: zh_cn